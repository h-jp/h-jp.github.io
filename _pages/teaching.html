permalink: /teaching/

{% assign profile = site.data.profile %}

<div class="teaching-data-list">
{% for course in profile.teaching %}
  <article class="teaching-data-item">
    <h2>{{ course.title }}</h2>
    <p><strong>Audience:</strong> {{ course.audience }}</p>
    <p><strong>Period:</strong> {{ course.period }}</p>
    <p><strong>Role:</strong> {{ course.role }}</p>
  </article>
{% endfor %}
</div>
